name: Run Scraper

on:
  schedule:
    - cron: "*/30 * * * *"  # roda a cada 30 minutos
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libs
        run: pip install requests pandas beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit CSV
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@github.com"
          git add dados_jogadores.csv
          git commit -m "update data" || echo "no changes"
          git push
